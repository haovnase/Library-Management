<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Đăng nhập hệ thống quản lý Thư viện Lexicon.">
    <title>Đăng nhập | Lexicon Library</title>
    <link rel="stylesheet" th:href="@{/css/lexicon.css}">
    <script defer th:src="@{/js/lexicon.js}"></script>
</head>
<body class="auth-page">
<a class="skip-link" href="#main-content">Bỏ qua điều hướng</a>
<header class="site-header">
    <div class="container site-header__inner">
        <a class="brand" th:href="@{/}" aria-label="Lexicon Library - Trang chủ">
            <span class="brand__mark" aria-hidden="true">LX</span>
            <span>Lexicon Library</span>
        </a>
        <a class="text-link" th:href="@{/}">← Trang chủ</a>
    </div>
</header>

<main class="auth-main" id="main-content">
    <section class="auth-panel" aria-labelledby="login-title">
        <div class="auth-panel__header">
            <p class="eyebrow">Cổng thành viên</p>
            <h1 id="login-title">Chào mừng trở lại</h1>
            <p>Đăng nhập để tiếp tục sử dụng thư viện.</p>
        </div>

        <div class="notice notice--error" role="alert" th:if="${errorMessage}">
            <span th:text="${errorMessage}">Thông tin đăng nhập không đúng.</span>
        </div>

        <form class="form-stack" method="post" th:action="@{/login}">
            <div class="field">
                <label for="member-id">Mã thành viên hoặc tên đăng nhập</label>
                <input id="member-id"
                       name="member-id"
                       type="text"
                       autocomplete="username"
                       placeholder="Ví dụ: LIB-001"
                       required
                       autofocus>
            </div>

            <div class="field">
                <label for="password">Mật khẩu</label>
                <div class="password-field">
                    <input id="password"
                           name="password"
                           type="password"
                           autocomplete="current-password"
                           placeholder="Nhập mật khẩu"
                           required>
                    <button type="button"
                            data-password-toggle
                            aria-controls="password"
                            aria-pressed="false"
                            aria-label="Hiện mật khẩu">Hiện</button>
                </div>
            </div>

            <button class="button" type="submit">Đăng nhập</button>
        </form>

        <p class="auth-help">
            Nếu chưa có tài khoản hoặc quên thông tin đăng nhập, vui lòng liên hệ thủ thư.
        </p>
    </section>
</main>

<footer class="site-footer">
    <div class="container site-footer__bottom">
        <span>© <span data-current-year>2026</span> Lexicon Library</span>
        <span>Hệ thống quản lý thư viện</span>
    </div>
</footer>
</body>
</html>
