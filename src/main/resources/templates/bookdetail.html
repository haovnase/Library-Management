<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" th:content="${book.description ?: 'Thông tin chi tiết sách tại Thư viện Lexicon.'}">
    <title th:text="${book.bookName + ' | Lexicon Library'}">Chi tiết sách | Lexicon Library</title>
    <link rel="stylesheet" th:href="@{/css/lexicon.css}">
    <script defer th:src="@{/js/lexicon.js}"></script>
</head>
<body>
<a class="skip-link" href="#main-content">Bỏ qua điều hướng</a>
<header th:replace="~{fragments/layout :: header(${user}, 'search')}"></header>

<main id="main-content">
    <section class="section section--white">
        <div class="container">
            <p>
                <a class="text-link"
                   th:href="@{/books/search(keyword=${keyword ?: ''})}">← Quay lại kết quả tìm kiếm</a>
            </p>
            <div class="notice notice--success" role="status" th:if="${success}">
                <span th:text="${success}">Đặt trước sách thành công.</span>
            </div>
            <div class="notice notice--error" role="alert" th:if="${error}">
                <span th:text="${error}">Không thể đặt trước sách.</span>
            </div>

            <article class="detail">
                <div class="detail__cover">
                    <img th:src="${book.bookJacket != null and !#strings.isEmpty(book.bookJacket)
                                 ? book.bookJacket : '/other/book-placeholder.svg'}"
                         th:alt="|Bìa sách ${book.bookName}|">
                </div>

                <div class="detail__content">
                    <span class="meta" th:text="${book.type ?: 'Tài liệu'}">Tài liệu</span>
                    <h1 th:text="${book.bookName}">Tên sách</h1>
                    <p class="detail__author" th:text="|${book.author ?: 'Chưa rõ tác giả'}|">Tác giả</p>

                    <dl class="detail__facts">
                        <div class="fact">
                            <dt>ISBN</dt>
                            <dd th:text="${book.isbn ?: 'Chưa cập nhật'}">—</dd>
                        </div>
                        <div class="fact">
                            <dt>Năm xuất bản</dt>
                            <dd th:text="${book.year ?: 'Chưa cập nhật'}">—</dd>
                        </div>
                        <div class="fact">
                            <dt>Nhà xuất bản</dt>
                            <dd th:text="${book.publisher ?: 'Chưa cập nhật'}">—</dd>
                        </div>
                        <div class="fact">
                            <dt>Ngôn ngữ</dt>
                            <dd th:text="${book.language ?: 'Chưa cập nhật'}">—</dd>
                        </div>
                        <div class="fact">
                            <dt>Vị trí</dt>
                            <dd th:text="${book.location ?: 'Liên hệ thủ thư'}">—</dd>
                        </div>
                        <div class="fact">
                            <dt>Tình trạng</dt>
                            <dd th:text="${book.quantity != null and book.quantity > 0
                                         ? 'Còn ' + book.quantity + ' cuốn' : 'Đang hết sách'}">
                                Đang hết sách
                            </dd>
                        </div>
                    </dl>

                    <section aria-labelledby="description-title">
                        <h2 id="description-title">Giới thiệu</h2>
                        <p class="detail__description"
                           th:text="${book.description ?: 'Nội dung giới thiệu đang được thư viện cập nhật.'}">
                            Nội dung giới thiệu.
                        </p>
                    </section>

                    <div class="detail__actions">
                        <span class="status status--success"
                              th:if="${book.quantity != null and book.quantity > 0}">
                            Có sẵn tại thư viện
                        </span>

                        <form th:if="${(book.quantity == null or book.quantity > 0)
                                      and user != null
                                      and #strings.equalsIgnoreCase(user.role, 'customer')}"
                              th:action="@{/book/preorder}"
                              method="post">
                            <input type="hidden" name="bookId" th:value="${book.id}">
                            <button class="button" type="submit">Đặt trước sách</button>
                        </form>

                        <a class="button button--secondary"
                           th:if="${user == null}"
                           th:href="@{/login}">Đăng nhập để sử dụng</a>
                    </div>
                </div>
            </article>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
